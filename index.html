<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HookMaster AI | Professional Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --neon-green: #0dff1a;
        --dark-bg: #050505;
        --card-bg: #0f0f0f;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--dark-bg);
        color: #fff;
        font-family: 'Poppins', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Glowing Animated Background */
      body::before {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        background: var(--neon-green);
        filter: blur(130px);
        opacity: 0.12;
        border-radius: 50%;
        animation: moveGlow 12s infinite alternate ease-in-out;
        z-index: -1;
      }

      @keyframes moveGlow {
        from { transform: translate(-30%, -30%); }
        to { transform: translate(30%, 30%); }
      }

      .price-card {
        background: var(--card-bg);
        border: 1px solid #222;
        border-radius: 32px;
        padding: 45px 35px;
        text-align: center;
        max-width: 400px;
        width: 85%;
        box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        position: relative;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .badge {
        background: rgba(13, 255, 26, 0.1);
        color: var(--neon-green);
        padding: 8px 18px;
        border-radius: 14px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid var(--neon-green);
        display: inline-block;
        margin-bottom: 25px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .price-tag {
        font-size: 68px;
        font-weight: 700;
        color: var(--neon-green);
        margin: 15px 0;
        letter-spacing: -2px;
      }

      .price-tag span { font-size: 28px; vertical-align: top; margin-right: 5px; opacity: 0.8; }

      .features-list {
        text-align: left;
        margin: 35px 0;
        padding: 0;
        list-style: none;
      }

      .features-list li {
        margin-bottom: 18px;
        font-size: 15px;
        color: #aaa;
        display: flex;
        align-items: center;
      }

      .features-list li::before {
        content: '✓';
        color: var(--neon-green);
        margin-right: 15px;
        font-weight: 900;
      }

      .cta-button {
        display: block;
        background: var(--neon-green);
        color: #000;
        text-decoration: none;
        padding: 22px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 19px;
        box-shadow: 0 12px 35px rgba(13, 255, 26, 0.4);
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
      }

      .cta-button:hover {
        transform: scale(1.04) translateY(-3px);
        box-shadow: 0 20px 45px rgba(13, 255, 26, 0.6);
        background-color: #0bff1a;
      }

      .cta-button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>

    <div class="price-card">
      <div class="badge">Limited Launch Price</div>
      <h2 style="margin:0; font-size: 26px; letter-spacing: -0.5px;">HookMaster PRO</h2>
      <p style="color: #666; font-size: 14px; margin-top: 5px;">Lifetime Membership</p>
      
      <div class="price-tag"><span>$</span>29</div>

      <ul class="features-list">
        <li>Viral AI Hook Generator</li>
        <li>Unlimited Project Exports</li>
        <li>Premium Strategy Modules</li>
        <li>Instant Lifetime Updates</li>
      </ul>

      <a href="https://sandbox-checkout.paddle.com/checkout/custom?product_id=pro_01kmyc4gzzwhwewczv855y9j29" 
         class="cta-button">
        Get Started Now ⚡
      </a>
    </div>

  </body>
</html>
