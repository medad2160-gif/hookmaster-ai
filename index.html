<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HookMaster AI | Exclusive Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --neon-green: #0dff1a;
        --dark-bg: #050505;
        --card-bg: #111;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--dark-bg);
        color: #fff;
        font-family: 'Poppins', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 450px;
        padding: 20px;
        box-sizing: border-box;
      }

      .price-card {
        background: var(--card-bg);
        border: 1px solid #222;
        border-radius: 28px;
        padding: 40px 30px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        position: relative;
      }

      .badge {
        background: rgba(13, 255, 26, 0.1);
        color: var(--neon-green);
        padding: 6px 14px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: 1px solid var(--neon-green);
        margin-bottom: 20px;
        display: inline-block;
      }

      h1 {
        font-size: 28px;
        margin: 10px 0;
        font-weight: 700;
      }

      .price-tag {
        font-size: 56px;
        font-weight: 700;
        color: var(--neon-green);
        margin: 25px 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .price-tag span {
        font-size: 24px;
        margin-right: 5px;
      }

      .features-list {
        text-align: left;
        margin: 30px 0;
        padding: 0;
        list-style: none;
      }

      .features-list li {
        margin-bottom: 15px;
        font-size: 14px;
        color: #aaa;
        display: flex;
        align-items: center;
      }

      .features-list li::before {
        content: '✓';
        color: var(--neon-green);
        margin-right: 12px;
        font-weight: 900;
      }

      .cta-button {
        display: block;
        background: var(--neon-green);
        color: #000;
        text-decoration: none;
        padding: 20px;
        border-radius: 18px;
        font-weight: 700;
        font-size: 18px;
        box-shadow: 0 10px 25px rgba(13, 255, 26, 0.4);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .cta-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(13, 255, 26, 0.6);
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="price-card">
        <div class="badge">Special Launch Offer</div>
        <h1>HookMaster PRO</h1>
        <p style="color: #666; font-size: 14px;">One-time payment for lifetime access</p>
        
        <div class="price-tag"><span>$</span>29</div>

        <ul class="features-list">
          <li>Full AI Hook Generator Access</li>
          <li>Viral Video Frameworks</li>
          <li>Unlimited Content Modules</li>
          <li>24/7 Priority Support</li>
        </ul>

        <a href="https://sandbox-checkout.paddle.com/checkout/custom/pri_01kmwsxhmnefqzw2e6t8hrzzhd" class="cta-button">
          Get Started Now ⚡
        </a>
      </div>
    </div>

  </body>
</html>
