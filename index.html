<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralHook AI | مولد الخطافات</title>
    
    <!-- Scripts & Styles -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Space Grotesk', 'Noto Sans Arabic', sans-serif; }
        .container { max-width: 450px; margin: 0 auto; padding: 40px 20px; }
        
        /* Header Styles */
        .header { text-align: center; margin-bottom: 40px; }
        .badge { 
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71; padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
            margin-bottom: 20px;
        }
        .title { font-size: 48px; font-weight: 700; margin-bottom: 16px; letter-spacing: -1px; }
        .title span { color: #34d399; }
        .subtitle { color: #a1a1aa; font-size: 16px; line-height: 1.5; max-width: 380px; margin: 0 auto; }

        .input-group { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 24px; }
        .input-label { color: #71717a; font-size: 12px; font-weight: 600; margin-bottom: 12px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
        .text-input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; }
        .text-input::placeholder { color: #52525b; }
        
        .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .style-card { 
            background: #1a1a1a; border: 1px solid #27272a; border-radius: 12px; 
            padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .style-card.active { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .style-card:hover { background: #27272a; }
        .style-icon { font-size: 24px; margin-bottom: 12px; display: block; }
        .style-name { font-size: 13px; color: #a1a1aa; font-weight: 500; }
        .style-card.active .style-name { color: #10b981; }

        .generate-btn { 
            background: #10b981; color: #000; font-weight: 700; width: 100%; 
            padding: 16px; border-radius: 12px; font-size: 16px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .generate-btn:hover { background: #059669; transform: translateY(-1px); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-box { 
            background: #2d1616; border: 1px solid #4d1a1a; color: #ff6b6b; 
            padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; font-size: 14px;
        }
        
        .result-card { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-top: 20px; border-left: 4px solid #10b981; }
        .result-label { color: #10b981; font-size: 11px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        
        footer { text-align: center; color: #52525b; font-size: 12px; margin-top: 60px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [niche, setNiche] = useState('');
            const [tone, setTone] = useState('educational');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const styles = [
                { id: 'educational', name: 'Educational', icon: '🎓' },
                { id: 'controversial', name: 'Controversial', icon: '🔥' },
                { id: 'storytelling', name: 'Storytelling', icon: '📖' },
                { id: 'humorous', name: 'Humorous', icon: '😂' },
                { id: 'inspiring', name: 'Inspirational', icon: '✨' }
            ];

            const handleGenerate = async (e) => {
                if (e) e.preventDefault();
                if (!niche.trim()) {
                    setError('Please enter a niche or topic first');
                    return;
                }

                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ niche, tone, lang: 'ar' }),
                    });

                    const contentType = response.headers.get("content-type");
                    if (!contentType || !contentType.includes("application/json")) {
                        throw new Error('Server error: Invalid response format');
                    }

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || 'Failed to generate strategy');
                    setResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container" dir="rtl">
                    <header className="header">
                        <div className="badge">
                            <span>✨</span> استراتيجية انتشار مدعومة بالذكاء الاصطناعي
                        </div>
                        <h1 className="title">Viral<span>Hook</span> AI</h1>
                        <p className="subtitle">
                            أوقف التمرير وضاعف وصولك. أنشئ خطافات، أفكار، وسيناريوهات عالية التحويل في ثوانٍ.
                        </p>
                    </header>

                    <div className="input-group">
                        <label className="input-label">مجالك أو موضوعك</label>
                        <input 
                            className="text-input"
                            value={niche}
                            onChange={(e) => setNiche(e.target.value)}
                            placeholder="مثال: ديكور منزلي بسيط، تجارة العملات..."
                        />
                    </div>

                    <h3 className="input-label" style={{marginBottom: '15px'}}>اختر نبرة الصوت</h3>
                    
                    <div className="style-grid">
                        {styles.map(s => (
                            <div 
                                key={s.id}
                                className={`style-card ${tone === s.id ? 'active' : ''}`}
                                onClick={() => setTone(s.id)}
                                style={s.id === 'inspiring' ? {gridColumn: 'span 2'} : {}}
                            >
                                <span className="style-icon">{s.icon}</span>
                                <span className="style-name">{
                                    s.id === 'educational' ? 'تعليمي' :
                                    s.id === 'controversial' ? 'مثير للجدل' :
                                    s.id === 'storytelling' ? 'قصصي' :
                                    s.id === 'humorous' ? 'فكاهي' : 'ملهم'
                                }</span>
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={handleGenerate}
                        disabled={loading}
                        className="generate-btn"
                    >
                        {loading ? 'جاري الإنشاء...' : (
                            <>
                                <span>⚡</span> إنشاء استراتيجية الانتشار
                            </>
                        )}
                    </button>

                    {error && (
                        <div className="error-box">
                            {error}
                        </div>
                    )}

                    {result && (
                        <div className="results" style={{marginTop: '40px'}}>
                            <div className="result-card">
                                <div className="result-label">الخطاف (Hook)</div>
                                <p style={{fontSize: '18px', fontWeight: 'bold'}}>{result.hook}</p>
                            </div>
                            <div className="result-card" style={{borderColor: '#3498db'}}>
                                <div className="result-label" style={{color: '#3498db'}}>فكرة الفيديو</div>
                                <p>{result.videoIdea}</p>
                            </div>
                            <div className="result-card" style={{borderColor: '#9b59b6'}}>
                                <div className="result-label" style={{color: '#9b59b6'}}>السيناريو (Script)</div>
                                <p style={{whiteSpace: 'pre-wrap'}}>{result.script}</p>
                            </div>
                        </div>
                    )}

                    <footer>
                        © 2026 ViralHook AI. صمم للمبدعين الجادين.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
