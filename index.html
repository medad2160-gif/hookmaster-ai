<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HookMaster PRO</title>

  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .price-card {
      background: #111;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      color: white;
      width: 300px;
    }

    .badge {
      color: #0bff1a;
      border: 1px solid #0bff1a;
      padding: 6px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 15px;
      font-size: 12px;
    }

    .price-tag {
      font-size: 48px;
      color: #0bff1a;
      margin: 20px 0;
    }

    .features-list {
      list-style: none;
      padding: 0;
      margin: 20px 0;
      text-align: left;
    }

    .features-list li {
      margin: 10px 0;
    }

    .cta-button {
      background: #0bff1a;
      color: black;
      padding: 15px;
      border-radius: 12px;
      display: block;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .cta-button:hover {
      transform: scale(1.04);
      background-color: #0bff1a;
    }
  </style>
</head>

<body>

  <div class="price-card">
    <div class="badge">Limited Launch Price</div>
    <h2>HookMaster PRO</h2>
    <p style="color:#666;">Lifetime Membership</p>

    <div class="price-tag">$29</div>

    <ul class="features-list">
      <li>Viral AI Hook Generator</li>
      <li>Unlimited Project Exports</li>
      <li>Premium Strategy Modules</li>
      <li>Instant Lifetime Updates</li>
    </ul>

    <button onclick="checkout()" class="cta-button">
      Get Started Now ⚡
    </button>
  </div>

  <!-- Paddle -->
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>

  <script>
    Paddle.Environment.set("production");

    Paddle.Initialize({
      token: "live_d38c0579001a4620f84eb16b36d"
    });

    function checkout() {
      Paddle.Checkout.open({
        items: [
          {
            priceId: "pri_01kmyd5th55q5xpyg4wjt5jfwz",
            quantity: 1
          }
        ]
      });
    }
  </script>

</body>
</html>
