* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0d0f14;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 420px;
}

/* badge */
.badge {
  background: rgba(0,255,150,0.1);
  color: #00ffb3;
  padding: 8px 14px;
  border-radius: 20px;
  display: inline-block;
  font-size: 13px;
  margin-bottom: 15px;
}

/* title */
h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

h1 span {
  color: #00ffb3;
}

/* desc */
.desc {
  color: #aaa;
  line-height: 1.6;
  margin-bottom: 25px;
}

/* card */
.card {
  background: #151821;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

/* input */
input {
  width: 100%;
  padding: 14px;
  background: #0d0f14;
  border: none;
  border-radius: 10px;
  color: #fff;
  outline: none;
  margin-top: 10px;
}

/* tones */
.tones {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 15px;
}
