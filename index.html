<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralHook AI | مولد الخطافات</title>
    
    <!-- Scripts & Styles -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: 'Noto Sans Arabic', sans-serif; }
        .gradient-text { background: linear-gradient(to right, #10b981, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brutalist-card { background: #18181b; border: 1px solid #27272a; border-radius: 1rem; padding: 1.5rem; }
        .brutalist-input { background: #09090b; border: 1px solid #27272a; border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; outline: none; }
        .brutalist-input:focus { border-color: #10b981; }
        .brutalist-button { background: #10b981; color: #09090b; font-weight: 700; padding: 0.85rem; border-radius: 0.75rem; width: 100%; transition: 0.2s; }
        .brutalist-button:hover { background: #34d399; transform: translateY(-2px); }
        .brutalist-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [niche, setNiche] = useState('');
            const [tone, setTone] = useState('educational');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const handleGenerate = async (e) => {
                if (e) e.preventDefault(); // منع إعادة التحميل
                
                if (!niche.trim()) {
                    setError('الرجاء إدخال موضوع أولاً');
                    return;
                }

                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ niche, tone, lang: 'ar' }),
                    });

                    const contentType = response.headers.get("content-type");
                    if (!contentType || !contentType.includes("application/json")) {
                        const text = await response.text();
                        console.error("Non-JSON response:", text);
                        throw new Error('حدث خطأ في الخادم (API غير موجود أو معطل). تأكد من رفع مجلد api وملف generate.js');
                    }

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'فشل في جلب البيانات من السيرفر');
                    }

                    setResult(data);
                } catch (err) {
                    console.error(err);
                    setError(err.message || 'حدث خطأ غير متوقع');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen p-6 max-w-2xl mx-auto">
                    <header className="text-center mb-10">
                        <h1 className="text-5xl font-bold mb-4">فايرل <span className="gradient-text">هوك</span></h1>
                        <p className="text-zinc-400">أداة ذكية لإنشاء محتوى يخطف الأنظار</p>
                    </header>

                    <div className="brutalist-card mb-8">
                        <form onSubmit={handleGenerate} className="space-y-5">
                            <div>
                                <label className="block text-sm text-zinc-500 mb-2">ما هو مجالك؟</label>
                                <input 
                                    className="brutalist-input"
                                    value={niche}
                                    onChange={(e) => setNiche(e.target.value)}
                                    placeholder="مثال: الطبخ، البرمجة، العقارات..."
                                    required
                                />
                            </div>
                            
                            <div>
                                <label className="block text-sm text-zinc-500 mb-2">أسلوب المحتوى</label>
                                <select 
                                    className="brutalist-input"
                                    value={tone}
                                    onChange={(e) => setTone(e.target.value)}
                                >
                                    <option value="educational">تعليمي</option>
                                    <option value="controversial">مثير للجدل</option>
                                    <option value="humorous">فكاهي</option>
                                    <option value="storytelling">قصصي</option>
                                </select>
                            </div>

                            <button 
                                type="submit" 
                                disabled={loading} 
                                className="brutalist-button"
                            >
                                {loading ? 'جاري التحليل والإنشاء...' : 'إنشاء استراتيجية الانتشار'}
                            </button>
                        </form>
                    </div>

                    {error && (
                        <div className="bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-red-400 text-center mb-6">
                            {error}
                        </div>
                    )}

                    {result && (
                        <div className="space-y-6">
                            <div className="brutalist-card border-r-4 border-r-emerald-500">
                                <h3 className="text-emerald-400 font-bold text-xs uppercase mb-2">الخطاف (Hook)</h3>
                                <p className="text-xl font-bold">"{result.hook}"</p>
                            </div>
                            <div className="brutalist-card border-r-4 border-r-cyan-500">
                                <h3 className="text-cyan-400 font-bold text-xs uppercase mb-2">الفكرة المرئية</h3>
                                <p className="text-zinc-300">{result.videoIdea}</p>
                            </div>
                            <div className="brutalist-card border-r-4 border-r-violet-500">
                                <h3 className="text-violet-400 font-bold text-xs uppercase mb-2">النص (Script)</h3>
                                <p className="text-zinc-300 text-sm leading-relaxed whitespace-pre-wrap">{result.script}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
