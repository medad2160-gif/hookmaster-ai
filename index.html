<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralHook AI | مولد الخطافات</title>
    
    <!-- Scripts & Styles -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Noto Sans Arabic', sans-serif; }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        .input-group { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .input-label { color: #888; font-size: 14px; margin-bottom: 10px; display: block; }
        .text-input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 18px; }
        
        .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .style-card { 
            background: #1a1a1a; border: 2px solid transparent; border-radius: 12px; 
            padding: 20px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .style-card.active { border-color: #2ecc71; background: #1a1a1a; }
        .style-card:hover { background: #262626; }
        .style-icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .style-name { font-size: 14px; color: #ccc; }
        .style-card.active .style-name { color: #2ecc71; }

        .generate-btn { 
            background: #2ecc71; color: #000; font-weight: bold; width: 100%; 
            padding: 15px; border-radius: 12px; font-size: 18px; transition: 0.2s;
        }
        .generate-btn:hover { background: #27ae60; transform: scale(0.98); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-box { 
            background: #2d1616; border: 1px solid #4d1a1a; color: #ff6b6b; 
            padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; font-size: 14px;
        }
        
        .result-card { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-top: 20px; border-right: 4px solid #2ecc71; }
        .result-label { color: #2ecc71; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        footer { text-align: center; color: #555; font-size: 12px; margin-top: 40px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [niche, setNiche] = useState('');
            const [tone, setTone] = useState('educational');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const styles = [
                { id: 'controversial', name: 'مثير للجدل', icon: '🔥' },
                { id: 'educational', name: 'تعليمي', icon: '🎓' },
                { id: 'humorous', name: 'فكاهي', icon: '😂' },
                { id: 'storytelling', name: 'قصصي', icon: '📖' },
                { id: 'inspiring', name: 'ملهم', icon: '✨' }
            ];

            const handleGenerate = async (e) => {
                if (e) e.preventDefault();
                if (!niche.trim()) {
                    setError('الرجاء إدخال المجال أولاً');
                    return;
                }

                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ niche, tone, lang: 'ar' }),
                    });

                    const contentType = response.headers.get("content-type");
                    if (!contentType || !contentType.includes("application/json")) {
                        throw new Error('Unexpected token \'T\', "The page c"... is not valid JSON');
                    }

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || 'فشل في جلب البيانات');
                    setResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <div className="input-group">
                        <label className="input-label">منتجات</label>
                        <input 
                            className="text-input"
                            value={niche}
                            onChange={(e) => setNiche(e.target.value)}
                            placeholder="اكتب مجالك هنا..."
                        />
                    </div>

                    <h3 className="input-label" style={{textAlign: 'right', marginBottom: '15px'}}>اختر الأسلوب</h3>
                    
                    <div className="style-grid">
                        {styles.map(s => (
                            <div 
                                key={s.id}
                                className={`style-card ${tone === s.id ? 'active' : ''}`}
                                onClick={() => setTone(s.id)}
                                style={s.id === 'inspiring' ? {gridColumn: 'span 2'} : {}}
                            >
                                <span className="style-icon">{s.icon}</span>
                                <span className="style-name">{s.name}</span>
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={handleGenerate}
                        disabled={loading}
                        className="generate-btn"
                    >
                        {loading ? 'جاري الإنشاء...' : 'إنشاء استراتيجية الانتشار'}
                    </button>

                    {error && (
                        <div className="error-box">
                            {error}
                        </div>
                    )}

                    {result && (
                        <div className="results">
                            <div className="result-card">
                                <div className="result-label">الخطاف (Hook)</div>
                                <p style={{fontSize: '18px', fontWeight: 'bold'}}>{result.hook}</p>
                            </div>
                            <div className="result-card" style={{borderColor: '#3498db'}}>
                                <div className="result-label" style={{color: '#3498db'}}>الفكرة المرئية</div>
                                <p>{result.videoIdea}</p>
                            </div>
                            <div className="result-card" style={{borderColor: '#9b59b6'}}>
                                <div className="result-label" style={{color: '#9b59b6'}}>النص (Script)</div>
                                <p style={{whiteSpace: 'pre-wrap'}}>{result.script}</p>
                            </div>
                        </div>
                    )}

                    <footer>
                        © 2026 ViralHook AI. صمم للمبدعين الجادين.
                    </footer>
                </div>
            );
        };

            return (
                <div className="min-h-screen p-6 max-w-2xl mx-auto">
                    <header className="text-center mb-10">
                        <h1 className="text-5xl font-bold mb-4">فايرل <span className="gradient-text">هوك</span></h1>
                        <p className="text-zinc-400">أداة ذكية لإنشاء محتوى يخطف الأنظار</p>
                    </header>

                    <div className="brutalist-card mb-8">
                        <form onSubmit={handleGenerate} className="space-y-5">
                            <div>
                                <label className="block text-sm text-zinc-500 mb-2">ما هو مجالك؟</label>
                                <input 
                                    className="brutalist-input"
                                    value={niche}
                                    onChange={(e) => setNiche(e.target.value)}
                                    placeholder="مثال: الطبخ، البرمجة، العقارات..."
                                    required
                                />
                            </div>
                            
                            <div>
                                <label className="block text-sm text-zinc-500 mb-2">أسلوب المحتوى</label>
                                <select 
                                    className="brutalist-input"
                                    value={tone}
                                    onChange={(e) => setTone(e.target.value)}
                                >
                                    <option value="educational">تعليمي</option>
                                    <option value="controversial">مثير للجدل</option>
                                    <option value="humorous">فكاهي</option>
                                    <option value="storytelling">قصصي</option>
                                </select>
                            </div>

                            <button 
                                type="submit" 
                                disabled={loading} 
                                className="brutalist-button"
                            >
                                {loading ? 'جاري التحليل والإنشاء...' : 'إنشاء استراتيجية الانتشار'}
                            </button>
                        </form>
                    </div>

                    {error && (
                        <div className="bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-red-400 text-center mb-6">
                            {error}
                        </div>
                    )}

                    {result && (
                        <div className="space-y-6">
                            <div className="brutalist-card border-r-4 border-r-emerald-500">
                                <h3 className="text-emerald-400 font-bold text-xs uppercase mb-2">الخطاف (Hook)</h3>
                                <p className="text-xl font-bold">"{result.hook}"</p>
                            </div>
                            <div className="brutalist-card border-r-4 border-r-cyan-500">
                                <h3 className="text-cyan-400 font-bold text-xs uppercase mb-2">الفكرة المرئية</h3>
                                <p className="text-zinc-300">{result.videoIdea}</p>
                            </div>
                            <div className="brutalist-card border-r-4 border-r-violet-500">
                                <h3 className="text-violet-400 font-bold text-xs uppercase mb-2">النص (Script)</h3>
                                <p className="text-zinc-300 text-sm leading-relaxed whitespace-pre-wrap">{result.script}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
