<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HookMaster AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Step 2: Global Styles and Reset */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #000; /* Matching the dark green/black background in your design */
        font-family: 'Poppins', sans-serif;
      }

      #root {
        height: 100%;
      }

      /* Step 3: Professional CTA Button Style based on your image */
      .hookmaster-cta-button {
        position: fixed;
        bottom: 24px; /* Placed at the bottom for mobile-first feel, like your image */
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 48px); /* Responsive width */
        max-width: 420px; /* Max width for desktop */
        padding: 18px 24px;
        background-color: #0dff1a; /* The vibrant neon green from your image */
        color: #fff; /* White text on green for contrast */
        border-radius: 14px; /* Matches the curve in your image */
        text-decoration: none;
        font-size: 20px;
        font-weight: 700;
        z-index: 9999;
        text-align: center;
        display: flex;
        flex-direction: column; /* To stack the text and price */
        align-items: center;
        justify-content: center;
        line-height: 1.3;
        transition: all 0.2s ease-in-out;
        border: none;
        cursor: pointer;
        /* Step 4: The professional glowing shadow from your image */
        box-shadow: 0 4px 18px rgba(13, 255, 26, 0.6); 
      }

      /* Formatting the secondary text (Price) like the image */
      .hookmaster-cta-button span.price {
        font-size: 16px;
        font-weight: 600;
        opacity: 0.8;
        margin-top: 2px;
      }

      /* Step 5: Professional interaction effects */
      .hookmaster-cta-button:hover {
        background-color: #0bda17;
        box-shadow: 0 6px 24px rgba(13, 255, 26, 0.8);
        transform: translateX(-50%) translateY(-2px);
      }

      .hookmaster-cta-button:active {
        transform: translateX(-50%) translateY(1px);
        box-shadow: 0 3px 12px rgba(13, 255, 26, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <a href="https://sandbox-checkout.paddle.com/checkout/custom/pri_01kmwsxhmnefqzw2e6t8hrzzhd" 
       class="hookmaster-cta-button"
       target="_blank">
       Get HookMaster PRO
       <span class="price">at $74.99 💸</span>
    </a>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
