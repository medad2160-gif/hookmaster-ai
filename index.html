<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diff Viewer</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: #0f1115;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* Modal */
.modal {
  width: 95%;
  max-width: 900px;
  background: #1a1d23;
  border-radius: 20px;
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.header h2 {
  font-size: 20px;
}

.close {
  font-size: 22px;
  cursor: pointer;
  opacity: 0.7;
}

/* Content */
.diff-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* Panels */
.panel {
  background: #111318;
  border-radius: 12px;
  padding: 10px;
  overflow: hidden;
}

/* Titles */
.panel-title {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}
